<!--名称-->
<div class="form-group">
    <label class="col-sm-2 control-label">名称:</label>
    <div class="layui-input-block col-sm-6">
        <input type="text" name="name" class="form-control post-params item-left" value="{$name|default=''}">
    </div>
</div>


<!--微信快递code-->
<div class="form-group" style="display: none;">
    <label class="col-sm-2 control-label">微信快递code:</label>
    <div class="layui-input-block col-sm-6">
        <input type="text" name="abbr" class="form-control post-params item-left" value="{$abbr|default=''}">
    </div>
</div>


<!--快递100code-->
<div class="form-group" style="display: none;">
    <label class="col-sm-2 control-label">快递100code:</label>
    <div class="layui-input-block col-sm-6">
        <input type="text" name="kd_hundred_code" class="form-control post-params item-left"
               value="{$kd_hundred_code|default=''}">
    </div>
</div>


<!--快递鸟code-->
<div class="form-group" style="display: none;">
    <label class="col-sm-2 control-label">快递鸟code:</label>
    <div class="layui-input-block col-sm-6">
        <input type="text" name="kd_bird_code" class="form-control post-params item-left"
               value="{$kd_bird_code|default=''}">
    </div>
</div>


<!--2删除-->
<div class="form-group" style="display: none;">
    <label class="col-sm-2 control-label">状态:</label>
    <div class="layui-input-block col-sm-6">
        <input type="text" name="status" class="form-control post-params item-left" value="{$status|default=''}">
    </div>
</div>


<!--单价-->
<div class="form-group">
    <label class="col-sm-2 control-label">单价:</label>
    <div class="layui-input-block col-sm-6">
        <input type="number" class="form-control post-params item-left" name="price" value="{$price|default=''}">
    </div>
</div>

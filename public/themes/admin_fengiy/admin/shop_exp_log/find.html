 <include file="public@header"/>
<style>
    textarea {
        border: 0;
        outline: none;
        background-color: rgba(0, 0, 0, 0);
    }

    input {
        border: 0;
        outline: none;
        background-color: rgba(0, 0, 0, 0);
    }

    .col-sm-6 {
        margin-top: 7px;
    }
</style>

</head>
<body>
<div class="wrap js-check-wrap">
    <ul class="nav nav-tabs">
        <li class="active"><a href="{:url('find',['id'=>$id,'pid'=>$pid,'order_num'=>$order_num,'params'=>$params])}">查看</a></li>
    </ul>
    <form method="post" class="form-horizontal js-ajax-form margin-top-20 layui-form" autocomplete="off"
          action="{:url('edit_post',['id'=>$id,'page'=>$page,'pid'=>$pid,'order_num'=>$order_num,'params'=>$params])}">


        



            <!--订单号-->            <div class="form-group">
                <label class="col-sm-2 control-label">订单号:</label>
                <div class="layui-input-block col-sm-6">
                                                {$order_num|default=''}                                    </div>
            </div>






        



            <!--图片-->            <div class="form-group">
                <label class="col-sm-2 control-label">图片:</label>
                <div class="layui-input-block col-sm-6">
                                                <if condition='!empty($images)'>
<foreach name='$images' item='value'>
<a href="javascript:imagePreviewDialog('{:cmf_get_image_preview_url($value)}');">
<img src='{:cmf_get_image_preview_url($value)}' style='height:40px;'>
</a>
</foreach>
</if>
                </div>
            </div>






        



            <!--备注-->            <div class="form-group">
                <label class="col-sm-2 control-label">备注:</label>
                <div class="layui-input-block col-sm-6">
                                                {$remark|default=''}                                    </div>
            </div>






        



            <!--物流id-->            <div class="form-group">
                <label class="col-sm-2 control-label">物流id:</label>
                <div class="layui-input-block col-sm-6">
                                                {$exp_id|default=''}                                    </div>
            </div>






        



            <!--快递单号-->            <div class="form-group">
                <label class="col-sm-2 control-label">快递单号:</label>
                <div class="layui-input-block col-sm-6">
                                                {$exp_num|default=''}                                    </div>
            </div>






        



            <!--快递名称-->            <div class="form-group">
                <label class="col-sm-2 control-label">快递名称:</label>
                <div class="layui-input-block col-sm-6">
                                                {$exp_name|default=''}                                    </div>
            </div>






        



            <!--编码-->            <div class="form-group">
                <label class="col-sm-2 control-label">编码:</label>
                <div class="layui-input-block col-sm-6">
                                                {$exp_code|default=''}                                    </div>
            </div>






        



            <!--物流电话-->            <div class="form-group">
                <label class="col-sm-2 control-label">物流电话:</label>
                <div class="layui-input-block col-sm-6">
                                                {$exp_phone|default=''}                                    </div>
            </div>






        



            <!--list_order-->            <div class="form-group">
                <label class="col-sm-2 control-label">list_order:</label>
                <div class="layui-input-block col-sm-6">
                                                {$list_order|default=''}                                    </div>
            </div>






        

        <!-- 主键id -->
        <input type="text" name="id" value="{$id}" class="form-control post-params item-left" style="display: none">


    </form>

</div>
<script src="__STATIC__/js/admin.js"></script>
</body>
</html>

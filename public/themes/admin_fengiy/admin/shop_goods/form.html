    <script>
        /**
         * 后台控制 添加方法

         //获取一级二级列表
         public function get_class_list()
         {
       $params = $this->request->param();
        //用户
        $ShopGoodsModel      = new \initmodel\ShopGoodsModel(); //商品管理   (ps:InitModel)
        $ShopGoodsClassModel = new \initmodel\ShopGoodsClassModel(); //分类管理   (ps:InitModel)

        if ($params['two_id']) $map[] = ['pid', '=', $params['two_id']];//查询三级列表
        if (empty(count($map))) $this->success('请求成功');

        //二级列表
        $two_list = $ShopGoodsClassModel->where($map)->order('id desc')->select();
        //查询数据,方便展示二级下拉框选中值
        if ($params['item_id']) {
            $item_info = $ShopGoodsModel->where(['id' => $params['item_id']])->find();
            if ($item_info) {
                foreach ($two_list as $k => &$v) {
                    $v['selected'] = false;
                    //这里的branch_id 更改为二级,三级id
                    if ($params['one_id'] && $item_info['class_two_id'] == $v['id']) $v['selected'] = 'selected';//选中
                    //if ($params['two_id'] && $item_info['class_three_id'] == $v['id']) $v['selected'] = 'selected';//选中
                }
            }
        }
        $this->success('请求成功', '', $two_list);
   }

         $two_info = $ClassModel->where('id', '=', $item['class_two_id'])->find();
         if ($one_info) $item['class_name'] = $one_info['name'];
         if ($two_info) $item['class_name'] = $two_info['name'];
         if ($two_info && $one_info) $item['class_name'] = $one_info['name'] . ' - ' . $two_info['name'];

         if ($params['class_id']) $params['search_class_id'] = $params['class_id'];
         if ($params['class_two_id']) $params['search_class_id'] = $params['class_two_id'];

         *
         **/

        layui.use(['form', 'element'], function () {
            var form = layui.form,
                element = layui.element;

            //获取默认值
            var one = $(".one").val();//一级值

                    if (res.code == 1) {
                        List = res.data;

                        tmp = '';
                        tmp += '<option value=""  >' + '请选择' + '</option>';

                        }

                    }

                }

            var two = $(".two").val();//二级值

<script type="text/javascript">
    var goods_id = "{$id}"

    // 商品规格
    var specData = [];
    var skuData = {}
    var is_attribute = 0;
    if (goods_id) {
        //获取数据
        $.ajax({
            url: "{:url('getEditData')}",
            type: "POST",
            data: {goods_id: goods_id},
            async: false,
            success: function (res) {
                if (res.code === 1) {
                    specData = res.data.specData;
                    skuData = res.data.skuData;
                    is_attribute = res.data.is_attribute;
                } else {
                    layer.msg(res.msg, {icon: 7});
                }
            }
        });
    }

    //layui方法===========================================
    layui.config({
        base: '__TMPL__/public/lib/sku-module/', // 设定扩展的 layui 模块的所在目录，一般用于外部模块扩展
    }).use(['form', 'skuTable'], function () {
        var form = layui.form,
            skuTable = layui.skuTable;
        //商品规格
        var obj = skuTable.render({
            isAttributeValue: is_attribute, //规格类型 0统一规格 1多规格
            isAttributeElemId: 'fairy-is-attribute', //规格类型容器id
            specTableElemId: 'fairy-spec-table', //规格表容器id
            skuTableElemId: 'fairy-sku-table', //sku表容器id
            sortable: true, //规格拖拽排序
            rowspan: true, //sku表相同属性值是否合并行
            specData: specData, //规格数据
            skuData: skuData, //多规格格式
            requestSuccessCode: 1, //请求成功返回状态码值
            uploadUrl: './uploadImage', //上传接口地址，接口要求返回格式参考 upload.json
            //统一规格配置项
            singleSkuTableConfig: {
                thead: [
                    {title: '价格', icon: 'layui-icon-cols'},
                    {title: '单价(kg)', icon: 'layui-icon-cols'},
                    {title: '库存', icon: 'layui-icon-cols'},
                ],
                tbody: [
                    {type: 'input', field: 'price', value: '', verify: 'required|number', reqtext: '价格不能为空'},
                    {type: 'input', field: 'unit_price', value: '', verify: 'required|number', reqtext: '单价(kg)不能为空'},
                    {type: 'input', field: 'stock', value: '', verify: 'required|number', reqtext: '库存不能为空'},
                ]
            },
            //多规格配置项
            multipleSkuTableConfig: {
                thead: [
                    {title: '图片', icon: ''},
                    {title: '价格', icon: 'layui-icon-cols'},
                    {title: '单价(kg)', icon: 'layui-icon-cols'},
                    {title: '库存', icon: 'layui-icon-cols'},
                ],
                tbody: [
                    {type: 'image', field: 'image', value: '', verify: '', reqtext: ''},
                    {type: 'input', field: 'price', value: '', verify: 'required|number', reqtext: '价格不能为空'},
                    {type: 'input', field: 'unit_price', value: '', verify: 'required|number', reqtext: '单价(kg)不能为空'},
                    {type: 'input', field: 'stock', value: '', verify: 'required|number', reqtext: '库存不能为空'},
                ]
            },
            // 统一规格格式
            // skuData: {
            //     'price': '80',
            //     'market_price': '100',
            //     'cost_price': '60',
            //     'stock': '999',
            //     'status': '0',
            // }
        });
        //监听规格添加
        form.on('submit(submit)', function (data) {
            //获取表单数据
            var attr_data = [];
            if (data.field.is_attribute == 1) {
                //获取规格数据
                attr_data = obj.getSpecData();
                var state = Object.keys(data.field).some(function (item, index, array) {
                    return item.startsWith('skus');
                });
                if (!state) {
                    layer.msg('sku表数据不能为空', {icon: 5, anim: 6});
                }
            }
            var post_data = data.field;
            post_data.goods_id = goods_id;
            post_data.attr_data = attr_data;
            $.ajax({
                url: "{:url('edit_post')}",
                type: "POST",
                data: post_data,
                success: function (res) {
                    if (res.code === 1) {
                        layer.msg(res.msg, {icon: 1});
                        if (!goods_id) {
                            setTimeout(function () {
                                parent.location.reload();
                            }, 1000)
                        } else {
                            setTimeout(function () {
                                //     location.reload();
                                window.location.href = "{:url('index')}";
                            }, 1000)

                        }
                    } else {
                        layer.msg(res.msg, {icon: 7});
                    }
                }
            });

            return false;
        });

        // ===== 售价 = 重量(规格值) × 单价（自动算，但允许手动覆盖）=====
        // 逻辑：
        //   1. 用户改单价(kg)时 → 从同行"重量"规格列获取值 → 自动算售价
        //   2. 用户在规格表里改"重量"规格值 → 重新渲染SKU表后，自动算售价
        // 兼容两种 SKU 模式：
        //   统一规格：重量直接是 input name="weight"，单价是 input name="unit_price"
        //   多规格：  重量是规格列 <td> 里的文本(如"320")，单价是 input name$="[unit_price]"
        // 标记机制：data-auto=1 表示自动算的售价；用户改过 price → data-auto=0，不再覆盖

        // ---- 辅助：从同行 tr 中获取重量值 ----
        function getWeightFromRow($row) {
            var $weightInput = $row.find('input[name="weight"], input[name$="[weight]"]').first();
            if ($weightInput.length) {
                return parseFloat($weightInput.val());
            }
            // 多规格：重量在规格列的 <td> 中（格式如 "320" 或 "320 kg"），找 th 表头文字含"重量"的列
            var $ths = $row.closest('table').find('thead th');
            var weightVal = null;
            $ths.each(function (i) {
                var title = $(this).text();
                if (title.indexOf('重量') !== -1 || title.indexOf('weight') !== -1) {
                    var td = $row[0].cells[i];
                    if (td && td.rowSpan > 1 && i === $row[0].cellIndex) {
                        // 当前格就是重量格
                        var text = $(td).text().trim();
                        weightVal = parseFloat(text);
                    } else if (td && td.rowSpan > 1) {
                        // 跨行的重量格不在当前行，从父行找
                        var $closestRow = $row;
                        while ($closestRow.length && $closestRow[0].rowIndex > 0) {
                            var prevRow = $closestRow[0].rowIndex - 1;
                            var prevCell = $row.closest('tbody')[0].rows[prevRow].cells[i];
                            if (prevCell) {
                                var prevText = $(prevCell).text().trim();
                                weightVal = parseFloat(prevText);
                                break;
                            }
                            $closestRow = $closestRow.prev();
                        }
                    } else if (td) {
                        var text = $(td).text().trim();
                        weightVal = parseFloat(text);
                    }
                    return false; // break
                }
            });
            return weightVal;
        }

        // ---- 辅助：计算并写入售价 ----
        function autoCalcPrice($row) {
            var $unitInput = $row.find('input[name="unit_price"], input[name$="[unit_price]"]').first();
            var $priceInput = $row.find('input[name="price"], input[name$="[price]"]').first();
            if (!$unitInput.length || !$priceInput.length) return;

            var w = getWeightFromRow($row);
            var u = parseFloat($unitInput.val());
            if (isNaN(w) || isNaN(u) || w <= 0 || u <= 0) return;
            if ($priceInput.attr('data-auto') === '0') return;

            $priceInput.attr('data-auto', '1').val((w * u).toFixed(2));
        }

        // 改单价 → 自动算售价
        $(document).on('input',
            '#fairy-sku-table input[name="unit_price"], #fairy-sku-table input[name$="[unit_price]"]',
            function () {
                autoCalcPrice($(this).closest('tr'));
            }
        );

        // 改重量（统一规格模式）→ 自动算售价
        $(document).on('input',
            '#fairy-sku-table input[name="weight"], #fairy-sku-table input[name$="[weight]"]',
            function () {
                autoCalcPrice($(this).closest('tr'));
            }
        );

        // 用户手动改售价 → 标记不再自动覆盖
        $(document).on('input', '#fairy-sku-table input[name="price"], #fairy-sku-table input[name$="[price]"]', function () {
            $(this).attr('data-auto', '0');
        });

        // 规格表里"重量"规格值变化 → 重新渲染SKU表后，对所有行自动算售价
        // skuTable.js 在添加/删除规格值后会调用 renderMultipleSkuTable()，
        // 我们通过监听 specTableElemId 的 DOM 变化来捕获重新渲染时机
        var skuObserver = new MutationObserver(function () {
            // 等待 SKU 表渲染完成
            setTimeout(function () {
                $('#fairy-sku-table tbody tr').each(function () {
                    autoCalcPrice($(this));
                });
            }, 50);
        });
        skuObserver.observe(document.getElementById('fairy-sku-table'), {childList: true, subtree: true});

        // 编辑回显：把后端返回的 price 标为手输，不再自动覆盖
        if (goods_id) {
            setTimeout(function () {
                $('#fairy-sku-table input[name="price"], #fairy-sku-table input[name$="[price]"]').attr('data-auto', '0');
            }, 0);
        }
    })
</script>

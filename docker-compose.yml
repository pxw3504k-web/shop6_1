services:
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - shop6

  php:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/var/www/html
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      - PHP_DISPLAY_ERRORS=On
      - PHP_MEMORY_LIMIT=128M
      - PHP_MAX_EXECUTION_TIME=300
    networks:
      - shop6

networks:
  shop6:
    driver: bridge
